<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Nguyễn Mai Hạnh Vy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            /* Bảng màu mới: Bright & Professional */
            --bg-color: #ffffff; 
            --text-color: #0f172a; 
            --accent-color: #4f46e5; /* Indigo trẻ trung */
            --secondary-bg: #f8fafc; 
            --slate-400: #64748b; 
            --nav-bg: rgba(255, 255, 255, 0.85);
            --max-width: 1000px; 
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.7; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Navigation Tối ưu UX/UI */
        nav { 
            display: flex; 
            justify-content: center; 
            padding: 0; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            background: var(--nav-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000; 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
            transition: var(--transition);
        }

        .nav-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            max-width: var(--max-width); 
            padding: 1.2rem 2rem; 
        }
        
        .logo { 
            font-weight: 800; 
            font-size: 1.3rem; 
            color: var(--text-color); 
            text-transform: uppercase; 
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
        }

        .logo::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-left: 4px;
        }

        nav ul { 
            display: flex; 
            list-style: none; 
            gap: 2.5rem; 
            margin: 0; 
            padding: 0; 
        }

        nav a { 
            text-decoration: none; 
            color: var(--text-color); 
            font-size: 0.9rem; 
            font-weight: 600; 
            transition: var(--transition);
            opacity: 0.7;
        }

        nav a:hover { 
            color: var(--accent-color); 
            opacity: 1;
        }

        /* Tối ưu các section chung */
        section { 
            padding: 120px 2rem 80px; 
            max-width: var(--max-width); 
            margin: 0 auto; 
        }

        .section-title { 
            font-size: 2.25rem; 
            font-weight: 800;
            margin-bottom: 3rem; 
            position: relative; 
            display: flex; 
            align-items: center; 
            width: 100%; 
            white-space: nowrap; 
            letter-spacing: -1px;
        }

        .section-title::after { 
            content: ''; 
            display: block; 
            height: 2px; 
            width: 100%; 
            max-width: 200px; 
            background: linear-gradient(to right, var(--accent-color), transparent); 
            margin-left: 20px; 
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .nav-container { padding: 1rem 1.5rem; }
            nav ul { gap: 1.2rem; }
            nav a { font-size: 0.8rem; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Hạnh Vy</div>
            <ul>
                <li><a href="#about">Giới thiệu</a></li>
                <li><a href="#education">Học vấn</a></li>
                <li><a href="#skills">Kỹ năng</a></li>
                <li><a href="#experience">Kinh nghiệm</a></li>
            </ul>
        </div>
    </nav>
